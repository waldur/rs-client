[package]
name = "waldur-client"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Rust client for Waldur MasterMind, generated from the OpenAPI schema (OpenStack + team management surface)"
repository = "https://github.com/waldur/rs-client"
readme = "README.md"

[dependencies]
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
chrono = { version = "0.4", features = ["serde"] }
url = "2"
uuid = { version = "1", features = ["serde", "v4"] }
bytes = "1"
