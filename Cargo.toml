[package]
name = "waldur-client"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Rust client for Waldur MasterMind, generated from the OpenAPI schema (OpenStack + team management surface)"
repository = "https://github.com/waldur/rs-client"
readme = "README.md"

[dependencies]
# Kept in sync with src/generated/REQUIRED_DEPS.toml, emitted by
# `openapi-to-rust generate` -- re-check that file after regenerating.
bytes = { version = "1", features = ["serde"] }
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
reqwest-middleware = "0.4"
reqwest-tracing = "0.5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
url = { version = "2", features = ["serde"] }
uuid = { version = "1", features = ["serde", "v4"] }
