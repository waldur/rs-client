# Configuration for https://github.com/gpu-cli/openapi-to-rust
#
# Regenerate with:
#   openapi-to-rust generate waldur-openapi-schema.yaml
# (this file is auto-detected from the current directory, no --config needed)

[generator]
spec_path = "waldur-openapi-schema.yaml"
output_dir = "src/generated"
module_name = "types"

[features]
enable_async_client = true

[generator.types]
# DRF's convention for an unset optional CharField-like value is "", not
# null. That's fine for Rust's String, but strict typed scalars (url::Url,
# and IP-address oneOf[ipv4, ipv6] enums) can never parse "" as an instance
# of "no value" -- there's no valid IP address or URL that means "empty".
# Confirmed live against a real instance for both uri (Customer.homepage)
# and ipv4/ipv6 (OpenStackFixedIp.ip_address, among others -- this shape
# recurs across many schemas, not just ones in our tag scope).
uri = "string"
ipv4 = "string"
ipv6 = "string"

[http_client]
# Placeholder default; every generated client method also accepts overriding
# the base URL/auth at construction time, so this is not load-bearing.
base_url = "https://api.example.com"

[http_client.auth]
type = "ApiKey"
header_name = "Authorization"

[client]
# Keep the generated surface to two areas of the Waldur API: OpenStack
# resource management, and team/organization management (customers, projects,
# users, roles, permissions, invitations). Everything else (marketplace,
# billing, support, monitoring integrations, other cloud providers, ...) is
# excluded to keep this crate small and reviewable.
#
# Widen or narrow this list, then re-run `openapi-to-rust generate` to update
# src/generated/.
prune_models = true
operations = [
  # OpenStack
  "tag:openstack",
  "tag:openstack-backups",
  "tag:openstack-external-networks",
  "tag:openstack-flavors",
  "tag:openstack-floating-ips",
  "tag:openstack-health-monitors",
  "tag:openstack-hypervisor-inventories",
  "tag:openstack-hypervisors",
  "tag:openstack-images",
  "tag:openstack-instance-availability-zones",
  "tag:openstack-instances",
  "tag:openstack-listeners",
  "tag:openstack-loadbalancers",
  "tag:openstack-marketplace-tenants",
  "tag:openstack-migrations",
  "tag:openstack-network-rbac-policies",
  "tag:openstack-networks",
  "tag:openstack-pool-members",
  "tag:openstack-pools",
  "tag:openstack-ports",
  "tag:openstack-routers",
  "tag:openstack-security-groups",
  "tag:openstack-server-groups",
  "tag:openstack-snapshots",
  "tag:openstack-subnets",
  "tag:openstack-tenants",
  "tag:openstack-volume-availability-zones",
  "tag:openstack-volume-types",
  "tag:openstack-volumes",

  # Team management
  "tag:customers",
  "tag:customer-permissions-reviews",
  "tag:organization-groups",
  "tag:project-permissions-reviews",
  "tag:project-types",
  "tag:projects",
  "tag:role-availabilities",
  "tag:roles",
  "tag:user-group-invitations",
  "tag:user-invitations",
  "tag:user-permission-requests",
  "tag:user-permissions",
  "tag:users",
]
